<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Navy Blue & Premium Yellow Logo Mark -->
  <defs>
    <linearGradient id="yellowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFD400" />
      <stop offset="100%" stop-color="#E5BE00" />
    </linearGradient>
  </defs>
  <!-- Outer Pentagon / Hexagon outline -->
  <polygon points="50,5 90,28 90,72 50,95 10,72 10,28" fill="#0D1B3D" stroke="url(#yellowGrad)" stroke-width="4" />
  <!-- Artistic dynamic lines representing stitch vector conversion -->
  <!-- "A" shape stylization -->
  <path d="M50,20 L75,70 L60,70 L50,45 L40,70 L25,70 Z" fill="url(#yellowGrad)" />
  <!-- Horizontal needle / thread line -->
  <path d="M15,55 L85,55" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" />
  <circle cx="50" cy="40" r="5" fill="#0D1B3D" />
</svg>
